<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>实验3-登录注册</title>
    <link rel="stylesheet" href="css/lab3-班号-学号后3位-index.css">
</head>
<body>
    <!-- 登录/注册对话框 -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <!-- 登录表单 -->
            <div id="loginForm">
                <h2>登录</h2>
                <input type="text" id="loginUsername" placeholder="用户名">
                <input type="password" id="loginPassword" placeholder="密码">
                <button onclick="login()">登录</button>
                <p>没有账号？<a href=" " onclick="showRegister()">立即注册</a ></p >
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" style="display: none;">
                <h2>注册</h2>
                <input type="text" id="regUsername" placeholder="用户名">
                <input type="password" id="regPassword" placeholder="密码">
                <button onclick="register()">注册</button>
                <p>已有账号？<a href="javascript:void(0)" onclick="showLogin()">立即登录</a ></p >
            </div>
        </div>
    </div>

    <!-- 登录成功后的主页面 -->
    <div id="mainContent" style="display: none;">
        <h1>欢迎进入主页面！</h1>
        <p>你已成功登录。</p >
        <button onclick="logout()">退出登录</button>
    </div>

    <script>
        // 切换到注册表单
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        // 切换到登录表单
        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        // 注册功能：将用户信息存入localStorage
        function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !password) {
                alert('用户名和密码不能为空！');
                return;
            }

            // 检查用户是否已存在
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const exists = users.find(u => u.username === username);
            if (exists) {
                alert('该用户名已被注册！');
                return;
            }

            // 保存用户信息
            users.push({ username, password });
            localStorage.setItem('users', JSON.stringify(users));
            alert('注册成功！请登录');
            showLogin();
        }

        // 登录功能：与localStorage中的信息比对
        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                alert('用户名和密码不能为空！');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                alert('登录成功！');
                // 隐藏对话框，显示主内容
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                alert('用户名或密码错误！');
            }
        }

        // 退出登录
        function logout() {
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('authModal').style.display = 'block';
            // 清空输入框
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            showLogin();
        }
    </script>
</body>
</html>
