<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <link rel="stylesheet" href="lab3-2504-132-index.css">
</head>
<body>
<!-- 头部：固定定位 + 浮动 -->
<div class="header">
    <div class="logo">图书商城</div>
    <ul class="nav">
        <li>首页</li>
        <li>图书分类</li>
        <li>热门推荐</li>
        <li>新书上市</li>
        <li>关于我们</li>
        <!-- 登录/注册 / 用户信息 -->
        <li id="userBar">
            <span onclick="showModal()">登录/注册</span>
        </li>
    </ul>
</div>

<!-- 主体容器 -->
<div class="container">
    <!-- 左侧导航：相对定位 -->
    <div class="left">
        <h3>图书分类</h3>
        <ul class="category">
            <li>计算机图书</li>
            <li>文学小说</li>
            <li>历史传记</li>
            <li>少儿读物</li>
            <li>考试教材</li>
        </ul>
    </div>

    <!-- 中间内容 -->
    <div class="middle">
        <div class="book-show">
            <!-- 父相子绝 -->
            <div class="book-item">
                <img src="1.webp" alt="图书封面">
                <div class="book-info">点击查看详情</div>
            </div>
            <div class="book-item"><img src="2.jpg" alt="图书封面"></div>
            <div class="book-item"><img src="https://picsum.photos/200/280" alt="图书封面"></div>
        </div>

        <div class="hot">
            <h3>热门推荐</h3>
            <div class="hot-item">热门图书1</div>
            <div class="hot-item">热门图书2</div>
            <div class="hot-item">热门图书3</div>
        </div>

        <div class="new-book">
            <h3>新书上市</h3>
            <table border="1" cellpadding="8" cellspacing="0">
                <tr><th>书名</th><th>作者</th><th>价格</th></tr>
                <tr><td>HTML从入门到精通</td><td>张三</td><td>59元</td></tr>
                <tr><td>CSS设计指南</td><td>李四</td><td>49元</td></tr>
                <tr><td>JavaScript实战</td><td>王五</td><td>69元</td></tr>
            </table>
        </div>
    </div>

    <!-- 右侧广告：固定定位 -->
    <div class="right">
        <h3>促销信息</h3>
        <p>满100减20</p>
        <p>新书8折</p>
        <p>会员折上折</p>
    </div>
</div>

<!-- 登录/注册对话框 -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <!-- 登录表单 -->
        <div id="loginForm">
            <h2>登录</h2>
            <div class="error-tip" id="loginTip"></div>
            <input type="text" id="loginUsername" placeholder="请输入用户名（3-16位）">
            <div class="pwd-box">
                <input type="password" id="loginPassword" placeholder="请输入密码（6-16位）">
                <span class="toggle-pwd" onclick="togglePwd('loginPassword')">👁️</span>
            </div>
            <button onclick="login()">登录</button>
            <p>没有账号？<a href="javascript:void(0)" onclick="showRegister()">立即注册</a></p>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" style="display: none;">
            <h2>注册</h2>
            <div class="error-tip" id="regTip"></div>
            <input type="text" id="regUsername" placeholder="请输入用户名（3-16位）">
            <div class="pwd-box">
                <input type="password" id="regPassword" placeholder="请输入密码（6-16位）">
                <span class="toggle-pwd" onclick="togglePwd('regPassword')">👁️</span>
            </div>
            <div class="pwd-box">
                <input type="password" id="regRepPassword" placeholder="请确认密码">
                <span class="toggle-pwd" onclick="togglePwd('regRepPassword')">👁️</span>
            </div>
            <button onclick="register()">注册</button>
            <p>已有账号？<a href="javascript:void(0)" onclick="showLogin()">立即登录</a></p>
        </div>
    </div>
</div>

<script>
    // ==================== 页面加载初始化 ====================
    window.onload = function () {
        // 检查登录状态
        checkLoginStatus();
        // 点击遮罩层关闭模态框
        document.getElementById('authModal').onclick = function (e) {
            if (e.target === this) closeModal();
        }
    }

    // ==================== 模态框控制 ====================
    // 显示模态框
    function showModal() {
        document.getElementById('authModal').style.display = 'flex';
        document.getElementById('loginTip').innerText = '';
        document.getElementById('regTip').innerText = '';
    }
    // 关闭模态框
    function closeModal() {
        document.getElementById('authModal').style.display = 'none';
    }

    // ==================== 表单切换 ====================
    // 切换到注册表单
    function showRegister() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
    }
    // 切换到登录表单
    function showLogin() {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
    }

    // ==================== 密码显隐切换 ====================
    function togglePwd(id) {
        const pwdInput = document.getElementById(id);
        pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password';
    }

    // ==================== 注册功能 ====================
    function register() {
        const tip = document.getElementById('regTip');
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const repPassword = document.getElementById('regRepPassword').value;

        // 表单验证
        if (!username || !password || !repPassword) {
            tip.innerText = '❌ 所有字段不能为空！';
            return;
        }
        if (username.length < 3 || username.length > 16) {
            tip.innerText = '❌ 用户名长度3-16位！';
            return;
        }
        if (password.length < 6 || password.length > 16) {
            tip.innerText = '❌ 密码长度6-16位！';
            return;
        }
        if (password !== repPassword) {
            tip.innerText = '❌ 两次密码输入不一致！';
            return;
        }

        // 检查用户是否已存在
        const users = JSON.parse(localStorage.getItem('users')) || [];
        const exists = users.find(u => u.username === username);
        if (exists) {
            tip.innerText = '❌ 该用户名已被注册！';
            return;
        }

        // 保存用户
        users.push({ username, password });
        localStorage.setItem('users', JSON.stringify(users));
        tip.innerText = '';
        alert('✅ 注册成功！请登录');
        showLogin();
    }

    // ==================== 登录功能 ====================
    function login() {
        const tip = document.getElementById('loginTip');
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;

        // 表单验证
        if (!username || !password) {
            tip.innerText = '❌ 用户名和密码不能为空！';
            return;
        }

        // 校验用户信息
        const users = JSON.parse(localStorage.getItem('users')) || [];
        const user = users.find(u => u.username === username && u.password === password);
        
        if (user) {
            // 保存登录状态
            localStorage.setItem('currentUser', JSON.stringify(user));
            tip.innerText = '';
            alert('✅ 登录成功！');
            closeModal();
            checkLoginStatus(); // 更新导航栏
        } else {
            tip.innerText = '❌ 用户名或密码错误！';
        }
    }

    // ==================== 登录状态检查 ====================
    function checkLoginStatus() {
        const userBar = document.getElementById('userBar');
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        
        if (currentUser) {
            // 已登录：显示用户名+退出按钮
            userBar.innerHTML = `
                <span class="user-info">欢迎，${currentUser.username}</span>
                <button class="logout-btn" onclick="logout()">退出</button>
            `;
        } else {
            // 未登录：显示登录/注册
            userBar.innerHTML = '<span onclick="showModal()">登录/注册</span>';
        }
    }

    // ==================== 退出登录 ====================
    function logout() {
        // 清除登录状态
        localStorage.removeItem('currentUser');
        alert('✅ 已退出登录！');
        checkLoginStatus();
        // 清空表单
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('regUsername').value = '';
        document.getElementById('regPassword').value = '';
        document.getElementById('regRepPassword').value = '';
        showLogin();
    }
</script>
</body>
</html>
