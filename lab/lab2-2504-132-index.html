<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <link rel="stylesheet" href="lab2-2504-132-index.css">
     <link rel="stylesheet" href=".css.css">
</head>
<body>
<!-- 头部：固定定位 + 浮动 -->
<div class="header">
    <div class="logo">图书商城</div>
    <ul class="nav">
        <li>首页</li>
        <li>图书分类</li>
        <li>热门推荐</li>
        <li>新书上市</li>
        <li>关于我们</li>
    </ul>
</div>

<!-- 主体容器 -->
<div class="container">
    <!-- 左侧导航：相对定位 -->
    <div class="left">
        <h3>图书分类</h3>
        <ul class="category">
            <li>计算机图书</li>
            <li>文学小说</li>
            <li>历史传记</li>
            <li>少儿读物</li>
            <li>考试教材</li>
        </ul>
    </div>

    <!-- 中间内容 -->
    <div class="middle">
        <div class="book-show">
            <!-- 父相子绝 -->
            <div class="book-item">
                <img src="1.webp" alt="图书封面">
                <div class="book-info">点击查看详情</div>
            </div>
            <div class="book-item"><img src="" alt="图书封面"></div>
            <div class="book-item"><img src="https://picsum.photos/200/280" alt="图书封面"></div>
        </div>

        <div class="hot">
            <h3>热门推荐</h3>
            <div class="hot-item">热门图书1</div>
            <div class="hot-item">热门图书2</div>
            <div class="hot-item">热门图书3</div>
        </div>

        <div class="new-book">
            <h3>新书上市</h3>
            <table border="1" cellpadding="8" cellspacing="0">
                <tr><th>书名</th><th>作者</th><th>价格</th></tr>
                <tr><td>HTML从入门到精通</td><td>张三</td><td>59元</td></tr>
                <tr><td>CSS设计指南</td><td>李四</td><td>49元</td></tr>
                <tr><td>JavaScript实战</td><td>王五</td><td>69元</td></tr>
            </table>
        </div>
    </div>

    <!-- 右侧广告：固定定位 -->
    <div class="right">
        <h3>促销信息</h3>
        <p>满100减20</p>
        <p>新书8折</p>
        <p>会员折上折</p>
    </div>
</div>
    <!-- 登录/注册对话框 -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <!-- 登录表单 -->
            <div id="loginForm">
                <h2>登录</h2>
                <input type="text" id="loginUsername" placeholder="用户名">
                <input type="password" id="loginPassword" placeholder="密码">
                <button onclick="login()">登录</button>
                <p>没有账号？<a href=" " onclick="showRegister()">立即注册</a ></p >
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" style="display: none;">
                <h2>注册</h2>
                <input type="text" id="regUsername" placeholder="用户名">
                <input type="password" id="regPassword" placeholder="密码">
                <button onclick="register()">注册</button>
                <p>已有账号？<a href="javascript:void(0)" onclick="showLogin()">立即登录</a ></p >
            </div>
        </div>
    </div>

    <!-- 登录成功后的主页面 -->
    <div id="mainContent" style="display: none;">
        <h1>欢迎进入主页面！</h1>
        <p>你已成功登录。</p >
        <button onclick="logout()">退出登录</button>
    </div>

    <script>
        // 切换到注册表单
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        // 切换到登录表单
        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        // 注册功能：将用户信息存入localStorage
        function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !password) {
                alert('用户名和密码不能为空！');
                return;
            }

            // 检查用户是否已存在
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const exists = users.find(u => u.username === username);
            if (exists) {
                alert('该用户名已被注册！');
                return;
            }

            // 保存用户信息
            users.push({ username, password });
            localStorage.setItem('users', JSON.stringify(users));
            alert('注册成功！请登录');
            showLogin();
        }

        // 登录功能：与localStorage中的信息比对
        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                alert('用户名和密码不能为空！');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                alert('登录成功！');
                // 隐藏对话框，显示主内容
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                alert('用户名或密码错误！');
            }
        }

        // 退出登录
        function logout() {
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('authModal').style.display = 'block';
            // 清空输入框
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            showLogin();
        }
    </script>
</body>
</html>
</body>
</html>
